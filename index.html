<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Chantiers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --bg2:#f5f5f3; --bg3:#eeece8;
  --text:#1a1a18; --text2:#666660; --text3:#aaaaaa;
  --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.22);
  --accent:#378ADD;
  --danger:#E24B4A; --danger-bg:#FCEBEB; --danger-border:#F09595; --danger-text:#A32D2D;
  --warn-bg:#FAEEDA; --warn-text:#BA7517;
  --info-bg:#E6F1FB; --info-border:#85B7EB; --info-text:#185FA5;
  --green-bg:#EAF3DE; --green-border:#97C459; --green-text:#3B6D11;
  --radius:8px; --radius-lg:12px;
  --font:'Segoe UI',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1c; --bg2:#282825; --bg3:#323230;
    --text:#f0efea; --text2:#a8a8a0; --text3:#555550;
    --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.2);
    --info-bg:#0c2840; --info-border:#185FA5; --info-text:#85B7EB;
    --danger-bg:#2a1010; --danger-border:#7A2020; --danger-text:#F09595;
    --warn-bg:#2a1e08; --warn-text:#EF9F27;
    --green-bg:#102010; --green-border:#3B6D11; --green-text:#97C459;
  }
}
body{ font-family:var(--font); background:var(--bg3); color:var(--text); min-height:100vh; }
.topbar{ background:var(--bg); border-bottom:1px solid var(--border); padding:0 16px; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:12px; }
.topbar h1{ font-size:15px; font-weight:600; }
.nav-tabs{ display:flex; gap:4px; }
.nav-tab{ font-size:12px; padding:6px 12px; border-radius:var(--radius); border:1px solid transparent; cursor:pointer; color:var(--text2); background:transparent; transition:all .12s; }
.nav-tab:hover{ background:var(--bg2); color:var(--text); }
.nav-tab.active{ background:var(--bg2); border-color:var(--border2); color:var(--text); font-weight:600; }
.view{ display:none; }
.view.active{ display:flex; flex-direction:column; }
#view-planning{ height:calc(100vh - 52px); flex-direction:row; }
.sidebar{ width:210px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header{ padding:12px; border-bottom:1px solid var(--border); }
.sidebar-list{ overflow-y:auto; flex:1; padding:6px; }
.main{ flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.main-header{ padding:10px 16px; border-bottom:1px solid var(--border); background:var(--bg); display:flex; justify-content:space-between; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; }
.main-scroll{ flex:1; overflow:auto; }
.gantt-wrap{ padding:14px 16px; min-width:520px; }
.legend-bar{ padding:8px 16px; border-top:1px solid var(--border); background:var(--bg); display:flex; flex-wrap:wrap; gap:10px; align-items:center; flex-shrink:0; }
#view-st{ background:var(--bg3); min-height:calc(100vh - 52px); }
.st-page{ max-width:900px; margin:0 auto; padding:24px 16px; }
.st-page-header{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.st-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; }
.st-card{ background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px 16px; display:flex; flex-direction:column; gap:7px; transition:border-color .12s; }
.st-card:hover{ border-color:var(--border2); }
.st-avatar{ width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; }
.st-tag{ display:inline-flex; align-items:center; gap:3px; font-size:10px; border-radius:4px; padding:2px 7px; font-weight:600; }
button{ font-family:var(--font); font-size:12px; padding:6px 11px; border-radius:var(--radius); border:1px solid var(--border2); background:var(--bg); color:var(--text); cursor:pointer; transition:background .12s,opacity .12s; white-space:nowrap; }
button:hover{ background:var(--bg2); }
button:active{ opacity:.75; }
button:disabled{ opacity:.4; cursor:not-allowed; }
button.primary{ background:var(--info-bg); border-color:var(--info-border); color:var(--info-text); }
button.danger-btn{ background:var(--danger-bg); border-color:var(--danger-border); color:var(--danger-text); }
button.full{ width:100%; text-align:left; }
input,select{ font-family:var(--font); font-size:12px; padding:7px 9px; border-radius:var(--radius); border:1px solid var(--border2); background:var(--bg); color:var(--text); width:100%; outline:none; transition:border-color .12s; }
input:focus,select:focus{ border-color:var(--accent); }
input[type=range]{ padding:0; border:none; background:none; height:4px; accent-color:var(--accent); }
input[type=color]{ padding:2px; height:34px; width:46px; cursor:pointer; }
label{ font-size:11px; color:var(--text2); display:block; margin-bottom:4px; }
.c-item{ padding:8px 10px; border-radius:var(--radius); cursor:pointer; margin-bottom:3px; border:1px solid transparent; }
.c-item:hover{ background:var(--bg3); }
.c-item.active{ background:var(--bg); border-color:var(--border2); }
.c-item .c-name{ font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.c-item .c-sub{ font-size:11px; color:var(--text2); margin-top:2px; }
.badge-delay{ font-size:10px; font-weight:600; background:var(--danger-bg); color:var(--danger-text); border-radius:4px; padding:1px 6px; flex-shrink:0; }
.alerts-panel{ border-bottom:1px solid var(--border); background:var(--bg); overflow-y:auto; max-height:260px; }
.alert-card{ background:var(--bg2); border:1px solid var(--danger-border); border-radius:var(--radius); padding:10px 12px; margin-bottom:8px; }
.contact-card{ background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:7px 10px; min-width:150px; flex:1; }
.modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; padding:16px; }
.modal-overlay.open{ display:flex; }
.modal-box{ background:var(--bg); border-radius:var(--radius-lg); border:1px solid var(--border); padding:20px; width:400px; max-width:100%; max-height:90vh; overflow-y:auto; }
.modal-title{ font-size:15px; font-weight:600; margin-bottom:14px; }
.form-group{ margin-bottom:10px; }
.form-row{ display:flex; gap:8px; }
.form-row>div{ flex:1; }
.gantt-row{ display:flex; align-items:stretch; min-height:46px; border-radius:4px; }
.gantt-row:nth-child(even){ background:var(--bg2); }
.gantt-label{ flex-shrink:0; padding-right:8px; min-width:0; padding-top:7px; padding-bottom:7px; }
.gantt-track{ flex:1; position:relative; min-height:28px; display:flex; align-items:center; }
.prog-track{ height:3px; background:var(--border); border-radius:2px; margin-top:3px; }
.prog-fill{ height:3px; border-radius:2px; }
.export-section{ margin-bottom:14px; }
.export-section+.export-section{ border-top:1px solid var(--border); padding-top:14px; }
.section-label{ font-size:10px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
.st-share-row{ display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:5px; gap:8px; }
.toast{ position:fixed; bottom:24px; right:24px; background:var(--text); color:var(--bg); border-radius:var(--radius); padding:10px 16px; font-size:13px; z-index:999; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; }
.toast.show{ opacity:1; transform:none; }
.empty{ text-align:center; color:var(--text2); font-size:13px; padding:3rem 1rem; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <div>
      <div style="font-size:10px;color:var(--text2);">Planning</div>
      <h1>🏗 Mes Chantiers</h1>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('planning')">📅 Planning</button>
      <button class="nav-tab" onclick="switchView('overview')">📊 Vue d'ensemble</button>
      <button class="nav-tab" onclick="switchView('st')" id="tab-st">👷 Sous-traitants <span id="st-count-badge" style="font-size:10px;color:var(--text3);margin-left:2px;"></span></button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="sync-indicator" style="font-size:11px;color:var(--text2);">☁ Connexion…</span>
    <button onclick="exportBackup()" title="Télécharger une sauvegarde" style="font-size:11px;padding:4px 8px;opacity:.7;" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.7'">💾</button>
    <button onclick="importBackup()" title="Restaurer depuis une sauvegarde" style="font-size:11px;padding:4px 8px;opacity:.7;" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.7'">📂</button>
    <div style="font-size:11px;color:var(--text2);" id="top-date"></div>
    <button onclick="openNonWorkingSettings()" title="Jours non travaillés" style="padding:5px 9px;font-size:13px;">📆</button>
  </div>
</div>

<!-- VUE PLANNING -->
<div id="view-planning" class="view active">
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="full" onclick="openNewChantier()">+ Nouveau chantier</button>
    </div>
    <div class="sidebar-list" id="chantier-list"></div>
  </div>
  <div class="main">
    <div class="main-header">
      <div style="min-width:0;">
        <div id="h-name" style="font-size:14px;font-weight:600;">Sélectionnez un chantier</div>
        <div id="h-meta" style="font-size:11px;color:var(--text2);margin-top:2px;"></div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">
        <button id="btn-alerts" style="display:none;" onclick="toggleAlerts()"></button>
        <button id="btn-export" style="display:none;" onclick="openExport()">Exporter ↓</button>
        <button id="btn-share" disabled onclick="openExport()">Partager ↗</button>
        <button id="btn-add" disabled onclick="openAddTask()">+ Tâche</button>
        <button id="btn-settings" disabled onclick="openChantierSettings()" title="Paramètres du chantier" style="padding:6px 9px;">⚙</button>
      </div>
    </div>
    <div id="alerts-panel" class="alerts-panel" style="display:none;">
      <div id="alerts-content" style="padding:10px 16px;"></div>
    </div>
    <div class="main-scroll">
      <div class="gantt-wrap">
        <!-- Barre de vues -->
        <div id="view-toolbar" style="display:none;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div style="display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;">
            <button id="vt-full" onclick="setGanttView('full')" style="border:none;border-radius:0;padding:6px 14px;font-size:12px;font-weight:600;background:var(--accent);color:white;">Vue complète</button>
            <button id="vt-month" onclick="setGanttView('month')" style="border:none;border-radius:0;padding:6px 14px;font-size:12px;background:var(--bg2);color:var(--text2);">Vue mensuelle</button>
          </div>
          <div id="month-nav" style="display:none;align-items:center;gap:6px;">
            <button onclick="changeGanttMonth(-1)" style="padding:5px 10px;font-size:14px;line-height:1;">‹</button>
            <select id="month-picker" onchange="onMonthPick()" style="font-size:12px;font-weight:600;padding:5px 8px;min-width:130px;"></select>
            <button onclick="changeGanttMonth(1)" style="padding:5px 10px;font-size:14px;line-height:1;">›</button>
            <button onclick="goToToday()" style="font-size:11px;padding:5px 10px;color:var(--danger);border-color:var(--danger);">Aujourd'hui</button>
          </div>
        </div>
        <div class="empty" id="gantt-empty">← Sélectionnez un chantier pour voir son planning</div>
        <div id="gantt" style="display:none;">
          <div id="gantt-header"></div>
          <div id="gantt-body" style="position:relative;"></div>
        </div>
      </div>
    </div>
    <div class="legend-bar" id="legend" style="display:none;"></div>
  </div>
</div>

<!-- VUE SOUS-TRAITANTS -->
<div id="view-st" class="view">
  <div class="st-page">
    <div class="st-page-header">
      <div>
        <h2 style="font-size:18px;font-weight:600;">Sous-traitants</h2>
        <div style="font-size:12px;color:var(--text2);margin-top:4px;" id="st-subtitle"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="st-search" placeholder="🔍 Rechercher..." oninput="renderSTPage()" style="width:170px;">
        <select id="st-filter-metier" onchange="renderSTPage()" style="width:145px;"></select>
        <button class="primary" onclick="openAddST()">+ Nouveau sous-traitant</button>
      </div>
    </div>
    <div class="st-grid" id="st-grid"></div>
  </div>
</div>

<!-- VUE D'ENSEMBLE -->
<div id="view-overview" class="view" style="background:var(--bg3);min-height:calc(100vh - 52px);">
  <div style="max-width:1100px;margin:0 auto;padding:24px 16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <div>
        <h2 style="font-size:18px;font-weight:600;">Vue d'ensemble</h2>
        <div id="ov-subtitle" style="font-size:12px;color:var(--text2);margin-top:3px;"></div>
      </div>
      <button onclick="openNewChantier()" class="primary">+ Nouveau chantier</button>
    </div>
    <!-- Indicateurs globaux -->
    <div id="ov-stats" style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;"></div>
    <!-- Grille chantiers -->
    <div id="ov-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;"></div>
  </div>
</div>

<!-- QUICK UPDATE POPUP -->
<div id="quick-popup" style="display:none;position:fixed;z-index:500;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:240px;max-width:300px;">
  <div id="qp-header" style="margin-bottom:10px;"></div>
  <div id="qp-bar" style="height:8px;background:var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden;">
    <div id="qp-fill" style="height:100%;border-radius:4px;transition:width .2s;"></div>
  </div>

  <div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Avancement</div>
  <div style="display:flex;gap:4px;margin-bottom:10px;">
    <button onclick="quickUpdateTask(-10)" style="flex:1;padding:5px;font-size:12px;font-weight:600;">−10%</button>
    <button onclick="quickUpdateTask(-5)"  style="flex:1;padding:5px;font-size:12px;">−5%</button>
    <button onclick="quickUpdateTask(5)"   style="flex:1;padding:5px;font-size:12px;">+5%</button>
    <button onclick="quickUpdateTask(10)"  style="flex:1;padding:5px;font-size:12px;font-weight:600;">+10%</button>
  </div>
  <button onclick="quickUpdateTask(100-(window._qpTask?window._qpTask.avancement:0))" style="width:100%;padding:5px 8px;background:var(--green-bg);border-color:var(--green-border);color:var(--green-text);margin-bottom:10px;font-size:12px;">✓ Marquer terminé (100%)</button>

  <div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;">Reporter la fin de</div>
  <div style="display:flex;gap:4px;margin-bottom:12px;">
    <button onclick="quickExtendTask(1)" style="flex:1;padding:5px;font-size:12px;">+1j</button>
    <button onclick="quickExtendTask(2)" style="flex:1;padding:5px;font-size:12px;">+2j</button>
    <button onclick="quickExtendTask(3)" style="flex:1;padding:5px;font-size:12px;">+3j</button>
    <button onclick="quickExtendTask(4)" style="flex:1;padding:5px;font-size:12px;">+4j</button>
    <button onclick="quickExtendTask(5)" style="flex:1;padding:5px;font-size:12px;font-weight:600;">+5j</button>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:8px;">
    <button id="qp-edit-btn" style="font-size:11px;color:var(--info-text);background:none;border:none;padding:0;cursor:pointer;">✏ Modifier en détail →</button>
    <button onclick="closeQuickPopup()" style="font-size:11px;padding:4px 8px;">Fermer</button>
  </div>
</div>


<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box"><div id="modal-content"></div></div>
</div>
<div class="toast" id="toast"></div>

async function pollCloud(){
  try{
    const cloudData=await loadFromCloud();
    if(!cloudData)return;
    if(!hasRealData(cloudData))return;
    const cloudStr=JSON.stringify(cloudData);
    const localStr=JSON.stringify(db);
    if(cloudStr!==localStr){
      db=cloudData;
      if(!db.nonWorkingDays)db.nonWorkingDays={skipWeekends:true,holidays:[...HOLIDAYS_BELGIQUE]};
      try{localStorage.setItem('planning_db_v3',JSON.stringify(db));}catch(e){}

  }catch(e){updateSyncIndicator('error');}
}

async function initDB(){
  updateSyncIndicator('loading');
  const localData=loadDB(); // données locales existantes
  const cloudData=await loadFromCloud();

  if(hasRealData(cloudData)){
    // Le cloud a des données réelles → utiliser le cloud
    db=cloudData;
    if(!db.nonWorkingDays)db.nonWorkingDays={skipWeekends:true,holidays:[...HOLIDAYS_BELGIQUE]};
    try{localStorage.setItem('planning_db_v3',JSON.stringify(db));}catch(e){}
    updateSyncIndicator('ok');
  } else if(hasRealData(localData)){
    // Cloud vide mais local a des données → garder local et pousser vers cloud
    db=localData;
    if(!db.nonWorkingDays)db.nonWorkingDays={skipWeekends:true,holidays:[...HOLIDAYS_BELGIQUE]};
    await saveToCloud(db);
    updateSyncIndicator('ok');
    toast('Données locales synchronisées vers le cloud ☁');

    // Rien nulle part → données par défaut
    db=defaultDB();
    if(!db.nonWorkingDays)db.nonWorkingDays={skipWeekends:true,holidays:[...HOLIDAYS_BELGIQUE]};
    await saveToCloud(db);
    updateSyncIndicator('ok');
  }

  renderSidebar();
  if(db.chantiers.length)selectC(db.chantiers[0].id);
  renderSTPage();
  if(!isST()) renderAlertBanner();
  setInterval(()=>{pollCloud();if(!isST())renderAlertBanner();},30000);
}

// --- UTILS ---
function pDate(s){return new Date(s+'T00:00:00');}
function addD(d,n){let r=new Date(d);r.setDate(r.getDate()+n);return r;}
function diffD(a,b){return Math.round((b-a)/86400000);}
function fmtD(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtShort(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function getST(id){return db.soustraitants.find(s=>s.id===id)||null;}
function stColor(id){const s=getST(id);return s?s.color:'#999';}
function stName(id){const s=getST(id);return s?s.nom:'—';}
function stInitials(nom){return nom.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function hexToRgb(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];}

// Jours non travaillés
function isNonWorking(date){
  const nwd=db.nonWorkingDays||{};
  if(nwd.skipWeekends){const d=date.getDay();if(d===0||d===6)return true;}
  const key=date.toISOString().slice(0,10);
  return(nwd.holidays||[]).includes(key);
}
function workingDays(dateA,dateB){
  if(dateA>dateB)return 0;
  let count=0,cur=new Date(dateA);
  while(cur<=dateB){if(!isNonWorking(cur))count++;cur=addD(cur,1);}
  return count;
}
// Durée affichée d'une tâche en jours calendaires (inclusive : même jour = 1j)
function taskDur(debut,fin){return diffD(pDate(debut),pDate(fin))+1;}
// Ajouter N jours ouvrés à partir d'une date (en avant)
function addWorkingDays(startDate, nDays){
  let cur=new Date(startDate),count=0;
  while(count<nDays){cur=addD(cur,1);if(!isNonWorking(cur))count++;}
  return cur;
}
// Reculer N jours ouvrés depuis une date (en arrière)
function subtractWorkingDays(endDate, nDays){
  let cur=new Date(endDate),count=0;
  while(count<nDays){cur=addD(cur,-1);if(!isNonWorking(cur))count++;}
  return cur;
}
// Convertir jours ouvrés → libellé lisible
function workingDaysLabel(n){
  if(!n)return '';
  const weeks=(n/5).toFixed(1);
  const months=(n/21).toFixed(1);
  const parts=[];
  if(n<10) parts.push(`${n}j ouvrés`);
  else if(n<25) parts.push(`${n}j ouvrés ≈ ${weeks} sem.`);
  else parts.push(`${n}j ouvrés ≈ ${months} mois`);
  return parts[0];
}

function expectedPct(t){
  const today=new Date(),s=pDate(t.debut),e=pDate(t.fin);
  if(today<=s)return 0;
  if(today>=e)return 100;
  const nwd=db.nonWorkingDays||{};
  if(nwd.skipWeekends||(nwd.holidays||[]).length){
    const total=workingDays(s,e)||1;
    const elapsed=workingDays(s,today);
    return Math.round(elapsed/total*100);
  }
  return Math.round(diffD(s,today)/diffD(s,e)*100);
}
function getPred(t){if(!t.dependsOn)return null;for(const c of db.chantiers){const p=c.taches.find(x=>x.id===t.dependsOn);if(p)return p;}return null;}
function isBlocked(t){
  const pred=getPred(t);
  if(!pred)return false;
  if(t.depType==='SS'){
    // Start-to-Start : bloqué seulement si le prédécesseur n'a pas encore commencé
    return pred.avancement===0&&new Date()<pDate(pred.debut);
  }
  // Finish-to-Start (défaut) : bloqué tant que le prédécesseur n'est pas terminé
  return pred.avancement<100;
}
function isDelayed(t){if(t.locked)return false;if(isBlocked(t))return false;const ep=expectedPct(t);return ep>10&&t.avancement<ep-10&&t.avancement<100;}
function delayDays(t){
  const s=pDate(t.debut),e=pDate(t.fin);
  const nwd=db.nonWorkingDays||{};
  const useWork=nwd.skipWeekends||(nwd.holidays||[]).length;
  const total=useWork?workingDays(s,e):taskDur(t.debut,t.fin);
  if(!total)return 0;
  return Math.max(0,Math.round((expectedPct(t)-t.avancement)/100*total));
}
function getImpacted(c,t){const tFin=pDate(t.fin);return c.taches.filter(x=>x.id!==t.id&&pDate(x.debut)>=tFin&&diffD(tFin,pDate(x.debut))<=21);}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function nextSTId(){return Math.max(0,...db.soustraitants.map(s=>s.id))+1;}
function nextTaskId(c){return Math.max(0,...c.taches.map(t=>t.id))+1;}
// Échapper les caractères HTML dans les attributs
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Avancement global d'un chantier
function chantierProgress(c){
  if(!c.taches.length)return 0;
  return Math.round(c.taches.reduce((s,t)=>s+t.avancement,0)/c.taches.length);
}
function chantierStatus(c){
  const delayed=c.taches.filter(t=>isDelayed(t)).length;
  const blocked=c.taches.filter(t=>isBlocked(t)).length;
  const done=c.taches.every(t=>t.avancement>=100);
  if(done)return{label:'Terminé',color:'var(--green-text)',bg:'var(--green-bg)'};
  if(delayed)return{label:delayed+' retard'+(delayed>1?'s':''),color:'var(--danger-text)',bg:'var(--danger-bg)'};
  if(blocked)return{label:blocked+' en attente',color:'var(--warn-text)',bg:'var(--warn-bg)'};
  return{label:'En cours',color:'var(--info-text)',bg:'var(--info-bg)'};
}

function deleteST(id){
  const st=getST(id);
  const used=db.chantiers.flatMap(c=>c.taches).filter(t=>t.stId===id).length;
  const msg=used?`⚠ ${st.nom} est assigné à ${used} tâche(s). Elles resteront sans sous-traitant. Confirmer ?`:`Supprimer ${st.nom} ?`;
  if(!confirm(msg))return;
  db.chantiers.forEach(c=>c.taches.forEach(t=>{if(t.stId===id)t.stId=null;}));
  db.soustraitants=db.soustraitants.filter(s=>s.id!==id);
  saveDB();closeModal();renderSTPage();renderSidebar();
  if(activeId)selectC(activeId);
  toast('Sous-traitant supprimé.');
}

function detectSTMode(){if(!urlToken)return;currentST=db.soustraitants.find(s=>s.token===urlToken)||null;}
function detectClientMode(){
  if(!urlClient)return;
  const c=db.chantiers.find(x=>x.clientToken===urlClient);
  if(c)currentClient={chantierId:c.id,chantierNom:c.nom,clientName:c.client};
}
function isST(){return!!currentST;}
function isClient(){return!!currentClient;}
function isViewer(){return isST()||isClient();}
function generateToken(){return Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,10);}
function ensureTokens(){
  let ch=false;
  db.soustraitants.forEach(s=>{if(!s.token){s.token=generateToken();ch=true;}});
  db.chantiers.forEach(c=>{if(!c.clientToken){c.clientToken=generateToken();ch=true;}});
  if(ch)saveDB();
}
function getSTLink(st){return window.location.origin+window.location.pathname+'?token='+st.token;}
function getClientLink(c){return window.location.origin+window.location.pathname+'?client='+c.clientToken;}

function quickAddTask(event, cid){

let ganttViewMode = 'full'; // 'full' | 'month'
let ganttMonth = { year: new Date().getFullYear(), month: new Date().getMonth() };

function setGanttView(mode){
  ganttViewMode = mode;
  document.getElementById('vt-full').style.cssText='border:none;border-radius:0;padding:6px 14px;font-size:12px;'+(mode==='full'?'font-weight:600;background:var(--accent);color:white;':'background:var(--bg2);color:var(--text2);');
  document.getElementById('vt-month').style.cssText='border:none;border-radius:0;padding:6px 14px;font-size:12px;'+(mode==='month'?'font-weight:600;background:var(--accent);color:white;':'background:var(--bg2);color:var(--text2);');
  document.getElementById('month-nav').style.display=mode==='month'?'flex':'none';
  const c=db.chantiers.find(x=>x.id===activeId);
  if(c)renderGantt(c);
}

function changeGanttMonth(delta){
  let {year,month}=ganttMonth;
  month+=delta;
  if(month<0){month=11;year--;}
  if(month>11){month=0;year++;}
  ganttMonth={year,month};
  updateMonthPicker();
  const c=db.chantiers.find(x=>x.id===activeId);
  if(c)renderGantt(c);
}

function goToToday(){
  ganttMonth={year:new Date().getFullYear(),month:new Date().getMonth()};
  updateMonthPicker();
  const c=db.chantiers.find(x=>x.id===activeId);
  if(c)renderGantt(c);
}

function onMonthPick(){
  const val=document.getElementById('month-picker').value;
  if(!val)return;
  const [y,m]=val.split('-').map(Number);
  ganttMonth={year:y,month:m};
  const c=db.chantiers.find(x=>x.id===activeId);
  if(c)renderGantt(c);
}

function buildMonthPickerOptions(c){
  // Générer la liste des mois couverts par le chantier
  if(!c||!c.taches.length)return '';
  const allD=c.taches.flatMap(t=>[pDate(t.debut),pDate(t.fin)]);
  const minD=new Date(Math.min(...allD)), maxD=new Date(Math.max(...allD));
  const opts=[];
  let cur=new Date(minD.getFullYear(),minD.getMonth(),1);
  const end=new Date(maxD.getFullYear(),maxD.getMonth(),1);
  while(cur<=end){
    const y=cur.getFullYear(),m=cur.getMonth();
    const label=cur.toLocaleString('fr',{month:'long',year:'numeric'});
    const selected=(y===ganttMonth.year&&m===ganttMonth.month)?' selected':'';
    opts.push(`<option value="${y}-${m}"${selected}>${label.charAt(0).toUpperCase()+label.slice(1)}</option>`);
    cur=new Date(y,m+1,1);
  }
  return opts.join('');
}

function updateMonthPicker(){
  const c=db.chantiers.find(x=>x.id===activeId);
  const sel=document.getElementById('month-picker');
  if(sel&&c) sel.innerHTML=buildMonthPickerOptions(c);
}

function renderGantt(c){
  document.getElementById('gantt-empty').style.display='none';
  document.getElementById('gantt').style.display='block';
  document.getElementById('view-toolbar').style.display='flex';

  if(!c.taches.length){
    // Pas de tâches : afficher quand même le calendrier sur 3 mois
    const today=new Date();
    let mn=new Date(today.getFullYear(),today.getMonth(),1);
    let mx=new Date(today.getFullYear(),today.getMonth()+3,0);
    const dow=mn.getDay(); mn=addD(mn,-(dow===0?6:dow-1));
    mx=addD(mx,7);
    const total=diffD(mn,mx);
    _renderGanttCore(c,[],mn,mx,total,'weeks');
    document.getElementById('gantt-body').innerHTML=
      `<div style="text-align:center;color:var(--text2);font-size:12px;padding:24px 0;border:1.5px dashed var(--border);border-radius:var(--radius);margin-top:6px;">
        Aucune tâche — cliquez sur <strong>+</strong> pour en ajouter une
       </div>`;
    return;
  }

  if(ganttViewMode==='month'){
    renderGanttMonthly(c);
  } else {
    renderGanttFull(c);
  }
}

// ---- VUE COMPLÈTE ----
function renderGanttFull(c){
  const taches=[...c.taches].sort((a,b)=>a.debut.localeCompare(b.debut));
  const allD=taches.flatMap(t=>[pDate(t.debut),pDate(t.fin)]);
  let mn=new Date(Math.min(...allD)),mx=new Date(Math.max(...allD));
  mn=addD(mn,-7);mx=addD(mx,14);
  const dow=mn.getDay();mn=addD(mn,-(dow===0?6:dow-1));
  const total=diffD(mn,mx);
  _renderGanttCore(c,taches,mn,mx,total,'weeks');
}

// ---- VUE MENSUELLE ----
function renderGanttMonthly(c){
  const {year,month}=ganttMonth;
  // Plage = mois sélectionné
  let mn=new Date(year,month,1);
  let mx=new Date(year,month+1,0); // dernier jour du mois
  // Snap mn au lundi précédent
  const dow=mn.getDay(); mn=addD(mn,-(dow===0?6:dow-1));
  mx=addD(mx,1);
  const total=diffD(mn,mx);

  // Filtrer les tâches qui chevauchent ce mois
  const mStart=new Date(year,month,1), mEnd=new Date(year,month+1,0);
  const taches=c.taches
    .filter(t=>pDate(t.fin)>=mStart&&pDate(t.debut)<=mEnd)
    .sort((a,b)=>a.debut.localeCompare(b.debut));

  // Mettre à jour le sélecteur de mois
  const sel=document.getElementById('month-picker');
  if(sel) sel.innerHTML=buildMonthPickerOptions(c);

  if(!taches.length){
    document.getElementById('gantt-header').innerHTML=`<div style="font-size:12px;color:var(--text2);padding:8px 0;">Aucune tâche ce mois.</div>`;
    document.getElementById('gantt-body').innerHTML='';return;
  }
  _renderGanttCore(c,taches,mn,mx,total,'days');
}

// ---- RENDU COMMUN ----
function _renderGanttCore(c,taches,mn,mx,total,granularity){
  const today=new Date();

  // ── EN-TÊTE TIMELINE ──
  let hH=`<div style="position:relative;height:${granularity==='days'?44:36}px;margin-left:${LW}px;margin-bottom:4px;">`;

  if(granularity==='days'){
    // Vue mensuelle : ligne mois + ligne jours numérotés
    let cur=new Date(mn),prevM=-1;
    while(cur<=mx){
      const p=diffD(mn,cur)/total*100;
      if(cur.getMonth()!==prevM){
        prevM=cur.getMonth();
        const mLabel=cur.toLocaleString('fr',{month:'long',year:'numeric'});
        hH+=`<span style="position:absolute;left:${p}%;font-size:10px;font-weight:700;color:var(--text);top:0;white-space:nowrap;">${mLabel.charAt(0).toUpperCase()+mLabel.slice(1)}</span>`;
      }
      cur=addD(cur,1);
    }
    // Ligne des jours
    cur=new Date(mn);
    while(cur<=mx){
      const p=diffD(mn,cur)/total*100;
      const day=cur.getDay();
      const isWE=(day===0||day===6);
      const key=cur.toISOString().slice(0,10);
      const isFerie=(db.nonWorkingDays?.holidays||[]).includes(key);
      const isToday=diffD(cur,today)===0;
      hH+=`<span style="position:absolute;left:${p}%;bottom:4px;font-size:${isToday?10:9}px;transform:translateX(-50%);font-weight:${isToday?700:400};color:${isToday?'var(--danger)':isWE||isFerie?'var(--text3)':'var(--text2)'};">${cur.getDate()}</span>`;
      if(day===1||day===0){// Lundi ou dimanche: trait vertical
        hH+=`<span style="position:absolute;left:${p}%;bottom:0;width:1px;height:8px;background:var(--border2);"></span>`;
      }
      cur=addD(cur,1);
    }
  } else {
    // Vue complète : mois + semaines (comportement original)
    let cur=new Date(mn),prevM=-1;
    while(cur<=mx){
      const p=diffD(mn,cur)/total*100;
      if(cur.getMonth()!==prevM){prevM=cur.getMonth();hH+=`<span style="position:absolute;left:${p}%;font-size:10px;font-weight:600;color:var(--text2);top:0;white-space:nowrap;">${cur.toLocaleString('fr',{month:'short',year:'2-digit'})}</span>`;}
      hH+=`<span style="position:absolute;left:${p}%;bottom:3px;font-size:9px;color:var(--text3);transform:translateX(-50%);">${cur.getDate()}</span>`;
      hH+=`<span style="position:absolute;left:${p}%;bottom:14px;width:1px;height:5px;background:var(--border2);"></span>`;
      cur=addD(cur,7);
    }
  }
  hH+='</div>';
  document.getElementById('gantt-header').innerHTML=hH;

  // ── CORPS ──
  const todayFrac=diffD(mn,today)/total;
  let bH=`<div style="position:relative;">`;

  // Ombrage jours non travaillés
  const nwd=db.nonWorkingDays||{};
  if(nwd.skipWeekends||(nwd.holidays||[]).length){
    let wCur=new Date(mn);
    while(wCur<mx){
      if(isNonWorking(wCur)){
        const pf=(diffD(mn,wCur)/total);
        const wf=(1/total);
        bH+=`<div style="position:absolute;left:calc(${LW}px + (100% - ${LW}px)*${pf.toFixed(4)});width:calc((100% - ${LW}px)*${wf.toFixed(4)});top:0;bottom:0;background:rgba(0,0,0,0.045);pointer-events:none;z-index:0;"></div>`;
      }
      wCur=addD(wCur,1);
    }
  }

  // Ligne aujourd'hui
  if(todayFrac>=0&&todayFrac<=1)
    bH+=`<div style="position:absolute;left:calc(${LW}px + (100% - ${LW}px)*${todayFrac.toFixed(4)});top:0;bottom:0;width:2px;background:var(--danger);z-index:5;pointer-events:none;">
      <span style="position:absolute;top:0;left:3px;font-size:9px;color:var(--danger);white-space:nowrap;font-weight:600;">Auj.</span></div>`;

  // Bandes contraintes d'accès
  const contraintes=(c.contraintes||[]);
  contraintes.forEach(ct=>{
    const cs=pDate(ct.debut),ce=pDate(ct.fin);
    if(ce<mn||cs>mx)return;
    const cp=Math.max(diffD(mn,cs),0)/total;
    const cw=(diffD(new Date(Math.max(cs,mn)),new Date(Math.min(ce,mx)))+1)/total;
    const isInac=ct.type==='inaccessible';
    bH+=`<div style="position:absolute;left:calc(${LW}px + (100% - ${LW}px)*${cp.toFixed(4)});width:calc((100% - ${LW}px)*${cw.toFixed(4)});top:0;bottom:0;background:${isInac?'rgba(226,75,74,0.08)':'rgba(239,159,39,0.1)'};border-left:2px solid ${isInac?'var(--danger)':'var(--warn-text)'};pointer-events:none;z-index:1;">
      <div style="position:sticky;top:2px;font-size:9px;font-weight:600;color:${isInac?'var(--danger-text)':'var(--warn-text)'};padding:2px 4px;white-space:nowrap;overflow:hidden;">${isInac?'🚫':'⚠️'} ${ct.note||( isInac?'Inaccessible':'Accès partiel')}</div>
    </div>`;
  });

  taches.forEach((t,i)=>{
    const ts=pDate(t.debut),te=pDate(t.fin);
    const visStart=new Date(Math.max(ts,mn));
    const visEnd=new Date(Math.min(te,mx));
    const lp=diffD(mn,ts)/total*100;
    const wp=Math.max((diffD(ts,te)+1)/total*100,.5);
    const visLp=diffD(mn,visStart)/total*100;
    const visWp=Math.max((diffD(visStart,visEnd)+1)/total*100,.3);
    const col=stColor(t.stId),delayed=isDelayed(t),done=t.avancement,durJ=taskDur(t.debut,t.fin);
    const locked=!!t.locked,blocked=isBlocked(t);
    const barCol=delayed?'var(--danger)':blocked?'#EF9F27':locked?'#888780':col;
    const pred=getPred(t);
    const isPartial=granularity==='days'&&(ts<mn||te>mx); // dépasse le mois affiché

    bH+=`<div class="gantt-row">
      <div class="gantt-label" style="width:${LW}px;cursor:pointer;${isST()&&t.stId===currentST?.id?'border-left:3px solid '+stColor(t.stId)+';padding-left:5px;':''}" onclick="openEdit(${t.id})" title="Cliquer pour modifier">
        <div style="display:flex;align-items:flex-start;gap:3px;">
          ${delayed?'<span style="color:var(--danger);font-size:11px;flex-shrink:0;">⚠</span>':''}
          ${blocked?`<span style="color:var(--warn-text);font-size:11px;flex-shrink:0;" title="En attente">🔗</span>`:''}
          ${locked?'<span style="font-size:10px;flex-shrink:0;">🔒</span>':''}
          ${isPartial?'<span style="font-size:10px;flex-shrink:0;" title="Continue sur un autre mois">↔</span>':''}
          <div style="font-size:11px;font-weight:600;line-height:1.35;word-break:break-word;color:${delayed?'var(--danger-text)':blocked?'var(--warn-text)':locked?'var(--text2)':'var(--text)'};">${esc(t.nom)}</div>
        </div>
        <div style="font-size:10px;color:var(--text2);margin-top:1px;">${esc(stName(t.stId))} · ${durJ}j${t.joursParSemaine&&t.joursParSemaine<5?' · '+t.joursParSemaine+'j/sem':''}</div>
        <div class="prog-track" style="width:90%;margin-top:3px;"><div class="prog-fill" style="width:${done}%;background:${barCol};"></div></div>
      </div>
      <div class="gantt-track" style="position:relative;cursor:pointer;" onclick="${isClient()?'openClientTaskModal('+t.id+')':isST()?'openSTTaskModal('+t.id+')':'openQuickPopup(event,'+t.id+')'}">
        <!-- Barre fond (durée totale, cliquable) -->
        <div style="position:absolute;left:${visLp}%;width:${visWp}%;height:22px;top:50%;transform:translateY(-50%);background:${col};opacity:${blocked?.1:.18};border-radius:${ts<mn?'0 4px 4px 0':te>mx?'4px 0 0 4px':'4px'};${locked?'border:1.5px dashed #888780;':''}${blocked?'border:1.5px dashed #EF9F27;':''}"></div>
        <!-- Barre avancement -->
        ${done>0?`<div style="position:absolute;left:${visLp}%;width:${Math.max(visWp*done/100,.3)}%;height:22px;top:50%;transform:translateY(-50%);background:${barCol};border-radius:4px;display:flex;align-items:center;padding:0 5px;min-width:4px;">
          <span style="font-size:9px;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${done>15?esc(t.nom):''}</span>
        </div>`:''}
        ${done<=15?`<div style="position:absolute;left:calc(${visLp}% + ${Math.max(visWp*done/100,.5)}% + 4px);top:50%;transform:translateY(-50%);font-size:9px;color:var(--text2);pointer-events:none;">${done}%</div>`:''}
        ${/* Badges commentaires/propositions */''}
        ${!isST()&&(t.commentaires||[]).length?`<div onclick="event.stopPropagation();openProposalReview(${t.id})" style="position:absolute;right:2px;top:2px;background:${(t.commentaires||[]).some(c=>c.type==='proposition'&&c.statut==='en_attente')?'var(--accent)':'var(--text2)'};color:white;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:7;">${(t.commentaires||[]).filter(c=>c.type==='proposition'&&c.statut==='en_attente').length||'💬'}</div>`:''}
      </div>
    </div>`;
  });
  bH+='</div>';
  document.getElementById('gantt-body').innerHTML=bH;
  requestAnimationFrame(()=>drawDependencyArrows(c,taches,mn,total));
}

function drawDependencyArrows(c, taches, mn, total){
  const body=document.getElementById('gantt-body');
  if(!body)return;
  const inner=body.querySelector('div');
  if(!inner)return;
  // Supprimer SVG existant
  const ex=inner.querySelector('#dep-svg');
  if(ex)ex.remove();
  // Y a-t-il des dépendances ?
  const deps=taches.filter(t=>t.dependsOn);
  if(!deps.length)return;

  const W=inner.offsetWidth;
  const trackW=W-LW;
  // Mesurer la hauteur réelle de chaque ligne
  const rows=inner.querySelectorAll('.gantt-row');
  const rowTops=[], rowMids=[];
  rows.forEach((r,i)=>{
    const top=r.offsetTop;
    const mid=top+r.offsetHeight/2;
    rowTops.push(top); rowMids.push(mid);
  });
  const totalH=inner.offsetHeight;

  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.id='dep-svg';
  svg.setAttribute('width',W);
  svg.setAttribute('height',totalH+4);
  svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:6;overflow:visible;';

  // Définitions des pointes de flèches
  svg.innerHTML=`<defs>
    <marker id="a-ok" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L5,3 L0,5.5 Z" fill="#888780"/>
    </marker>
    <marker id="a-warn" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L5,3 L0,5.5 Z" fill="#EF9F27"/>
    </marker>
    <marker id="a-err" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L5,3 L0,5.5 Z" fill="#E24B4A"/>
    </marker>
  </defs>`;

  deps.forEach(t=>{
    const pred=taches.find(x=>x.id===t.dependsOn);
    if(!pred)return;
    const predIdx=taches.indexOf(pred);
    const depIdx=taches.indexOf(t);
    if(predIdx<0||depIdx<0)return;

    // Point de départ : fin de la barre prédécesseur
    const predFinFrac=diffD(mn,pDate(pred.fin))/total;
    const x1=LW+predFinFrac*trackW;
    const y1=rowMids[predIdx]||predIdx*46+23;

    // Point d'arrivée : début de la barre dépendante
    const depStartFrac=diffD(mn,pDate(t.debut))/total;
    const x2=LW+depStartFrac*trackW;
    const y2=rowMids[depIdx]||depIdx*46+23;

    // Couleur selon état
    const predDelayed=isDelayed(pred);
    const depBlocked=isBlocked(t);
    const color=predDelayed?'#E24B4A':depBlocked?'#EF9F27':'#888780';
    const markerId=predDelayed?'a-err':depBlocked?'a-warn':'a-ok';

    // Tracé en L : sortie droite → coude → arrivée gauche
    const elbowX=Math.max(x1+6, x2-6, (x1+x2)/2);
    const d=`M ${x1.toFixed(1)} ${y1.toFixed(1)} L ${elbowX.toFixed(1)} ${y1.toFixed(1)} L ${elbowX.toFixed(1)} ${y2.toFixed(1)} L ${x2.toFixed(1)} ${y2.toFixed(1)}`;

    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',color);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-dasharray','4,2.5');
    path.setAttribute('marker-end',`url(#${markerId})`);
    svg.appendChild(path);

    // Petit cercle au point de départ
    const circle=document.createElementNS(NS,'circle');
    circle.setAttribute('cx',x1.toFixed(1));
    circle.setAttribute('cy',y1.toFixed(1));
    circle.setAttribute('r','3');
    circle.setAttribute('fill',color);
    svg.appendChild(circle);
  });

  inner.appendChild(svg);
}

function renderLegend(c){

  if(!stIds.length){el.style.display='none';return;}

    <span style="width:9px;height:9px;border-radius:2px;background:${st.color};"></span>${st.nom}</span>`;}).join('');

  el.innerHTML=html;
}

function syncMinFin(){
  const d=document.getElementById('f-debut').value;
  const fin=document.getElementById('f-fin');
  if(d){fin.min=d;if(fin.value&&fin.value<d)fin.value=d;}
}

function onDepChange(){
  const tid=parseInt(document.getElementById('f-dep')?.value)||null;
  const type=document.getElementById('f-dep-type')?.value||'FS';
  const hint=document.getElementById('dep-date-hint');
  const debutEl=document.getElementById('f-debut');
  const finEl=document.getElementById('f-fin');

  if(!tid){
    // Pas de dépendance — retirer les contraintes
    if(debutEl) debutEl.removeAttribute('min');
    if(hint) hint.style.display='none';
    return;
  }

  const c=db.chantiers.find(x=>x.id===activeId);
  const pred=c?.taches.find(x=>x.id===tid);
  if(!pred)return;

  let minDate;
  if(type==='FS'){
    // Commence après la FIN du prédécesseur
    minDate=addD(pDate(pred.fin),1);
  } else {
    // Commence après le DÉBUT du prédécesseur (SS)
    minDate=pDate(pred.debut);
  }

  const minStr=minDate.toISOString().slice(0,10);

  // Appliquer le min sur le champ début
  if(debutEl){
    debutEl.min=minStr;
    // Si la date actuelle est avant le minimum, la corriger
    if(!debutEl.value||debutEl.value<minStr) debutEl.value=minStr;
    // Propager au champ fin
    syncMinFin();
  }

  // Afficher un bandeau d'info
  if(hint){
    const label=type==='FS'
      ? `📅 Début au plus tôt le <strong>${fmtD(minDate)}</strong> (après la fin de &quot;${esc(pred.nom)}&quot;)`
      : `📅 Début au plus tôt le <strong>${fmtD(minDate)}</strong> (après le début de &quot;${esc(pred.nom)}&quot;)`;
    hint.innerHTML=label;
    hint.style.display='block';
  }

  // En mode durée — pré-sélectionner la tâche dans "Se termine avant"
  const finBeforeSel=document.getElementById('f-fin-before-task');
  if(finBeforeSel&&type==='FS'){
    // Chercher la première tâche qui commence après pred.fin
    const c2=db.chantiers.find(x=>x.id===activeId);
    finBeforeSel.value=''; // reset
  }
}

function openAddTask(){
  const c=db.chantiers.find(x=>x.id===activeId);
  const otherTaches=c?[...c.taches].sort((a,b)=>a.debut.localeCompare(b.debut)):[];

// -- Helpers pour le toggle mode saisie --
window._taskMode='dates';
window._contrainteMode='tache';

function setTaskMode(mode){
  window._taskMode=mode;
  document.getElementById('mode-dates').style.display=mode==='dates'?'block':'none';
  document.getElementById('mode-duree').style.display=mode==='duree'?'block':'none';
  document.getElementById('mode-dates-btn').style.cssText='flex:1;border:none;border-radius:0;padding:7px;font-size:12px;'+(mode==='dates'?'background:var(--accent);color:white;font-weight:600;':'background:var(--bg2);color:var(--text2);');
  document.getElementById('mode-duree-btn').style.cssText='flex:1;border:none;border-radius:0;padding:7px;font-size:12px;'+(mode==='duree'?'background:var(--accent);color:white;font-weight:600;':'background:var(--bg2);color:var(--text2);');
}

function setContrainteMode(mode){
  window._contrainteMode=mode;
  ['debut','tache','date'].forEach(m=>{
    const btn=document.getElementById('ctr-'+m+'-btn');
    const div=document.getElementById('ctr-'+m+'-div');
    if(btn) btn.style.cssText='flex:1;font-size:11px;padding:5px;'+(mode===m?'background:var(--accent);color:white;border-color:var(--accent);font-weight:600;':'background:var(--bg);color:var(--text2);');
    if(div) div.style.display=mode===m?'block':'none';
  });
  updateDureePreview();
}

function updateJpsHint(){
  const n=parseInt(document.getElementById('f-jps')?.value)||5;
  const hint=document.getElementById('jps-hint');
  if(hint) hint.textContent=n<5?`(${n}j sur 5 chaque semaine)`:'';}


function setDuree(v){
  document.getElementById('f-duree').value=v;
  updateDureeLabel();updateDureePreview();
}

function updateDureeLabel(){
  const n=parseFloat(document.getElementById('f-duree')?.value)||0;
  const el=document.getElementById('duree-label');
  if(el)el.textContent=n>0?'≈ '+workingDaysLabel(Math.round(n)):'';
  updateDureePreview();
}

function updateDureePreview(){
  const prev=document.getElementById('duree-preview');
  if(!prev)return;
  const n=Math.round(parseFloat(document.getElementById('f-duree')?.value)||0);
  if(!n){prev.style.display='none';return;}
  let startDate=null, endDate=null;
  const mode=window._contrainteMode||'debut';
  if(mode==='debut'){
    const dv=document.getElementById('f-debut-duree')?.value;
    if(!dv){prev.style.display='none';return;}
    startDate=pDate(dv);
    endDate=addWorkingDays(startDate,n);
  } else if(mode==='tache'){
    const tid=parseInt(document.getElementById('f-fin-before-task')?.value)||null;
    if(!tid){prev.style.display='none';return;}
    const c=db.chantiers.find(x=>x.id===activeId);
    const tref=c?.taches.find(x=>x.id===tid);
    if(!tref){prev.style.display='none';return;}
    endDate=addD(pDate(tref.debut),-1);
    startDate=subtractWorkingDays(endDate,n);
  } else {
    const dv=document.getElementById('f-fin-before-date')?.value;
    if(!dv){prev.style.display='none';return;}
    endDate=pDate(dv);
    startDate=subtractWorkingDays(endDate,n);
  }
  if(!startDate||!endDate){prev.style.display='none';return;}
  prev.style.display='block';
  prev.innerHTML=`📅 Début : <strong>${fmtD(startDate)}</strong> → Fin : <strong>${fmtD(endDate)}</strong> (${n} jours ouvrés)`;
}

function saveTask(){
  const nom=document.getElementById('f-nom').value.trim();
  const stId=parseInt(document.getElementById('f-st').value)||null;
  const avancement=parseInt(document.getElementById('f-av').value)||0;
  const locked=document.getElementById('f-locked')?.checked||false;
  const dependsOn=parseInt(document.getElementById('f-dep')?.value)||null;
  const depType=document.getElementById('f-dep-type')?.value||'FS';
  const joursParSemaine=parseInt(document.getElementById('f-jps')?.value)||5;
  if(!nom){toast('Le nom est requis.');return;}

  let debut, fin;
  const mode=window._taskMode||'dates';

  if(mode==='dates'){
    debut=document.getElementById('f-debut').value;
    fin=document.getElementById('f-fin').value;
    if(!debut||!fin){toast('Les dates sont requises.');return;}
    if(debut>fin){toast('La date de début doit être avant la fin.');return;}
  } else {
    const nDays=Math.round(parseFloat(document.getElementById('f-duree')?.value)||0);
    if(!nDays||nDays<1){toast('Indiquez une durée en jours ouvrés.');return;}
    const contrainte=window._contrainteMode||'debut';
    if(contrainte==='debut'){
      const dv=document.getElementById('f-debut-duree')?.value;
      if(!dv){toast('Indiquez une date de début.');return;}
      const startDate=pDate(dv);
      const endDate=addWorkingDays(startDate,nDays);
      debut=dv;
      fin=endDate.toISOString().slice(0,10);
    } else if(contrainte==='tache'){
      const tid=parseInt(document.getElementById('f-fin-before-task')?.value)||null;
      if(!tid){toast('Choisissez une tâche de référence.');return;}
      const c2=db.chantiers.find(x=>x.id===activeId);
      const tref=c2?.taches.find(x=>x.id===tid);
      if(!tref){toast('Tâche introuvable.');return;}
      const endDate=addD(pDate(tref.debut),-1);
      const startDate=subtractWorkingDays(endDate,nDays);
      debut=startDate.toISOString().slice(0,10);
      fin=endDate.toISOString().slice(0,10);
    } else {
      const dv=document.getElementById('f-fin-before-date')?.value;
      if(!dv){toast('Choisissez une date limite.');return;}
      const endDate=pDate(dv);
      const startDate=subtractWorkingDays(endDate,nDays);
      debut=startDate.toISOString().slice(0,10);
      fin=endDate.toISOString().slice(0,10);
    }
    if(debut>fin){toast('Durée trop longue par rapport à la contrainte.');return;}
  }

  const c=db.chantiers.find(x=>x.id===activeId);
  c.taches.push({id:nextTaskId(c),nom,stId,debut,fin,avancement,locked,dependsOn,depType,joursParSemaine,commentaires:[]});
  saveDB();closeModal();selectC(activeId);toast('Tâche ajoutée !');
}

function openEdit(tid){
  const c=db.chantiers.find(x=>x.id===activeId),t=c.taches.find(x=>x.id===tid);if(!t)return;
  const delayed=isDelayed(t),ep=expectedPct(t),durJ=diffD(pDate(t.debut),pDate(t.fin));
  const blocked=isBlocked(t), pred=getPred(t);
  // Build dep select with current value
  const depOpts=c.taches
    .filter(x=>x.id!==tid)
    .sort((a,b)=>a.debut.localeCompare(b.debut))
    .map(x=>`<option value="${x.id}"${t.dependsOn===x.id?' selected':''}>${esc(x.nom)}  (fin : ${fmtShort(pDate(x.fin))})</option>`)
    .join('');
  showModal(`<div class="modal-title">Modifier — ${esc(t.nom)}</div>
    ${delayed?`<div style="background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius);padding:8px 10px;margin-bottom:10px;font-size:11px;color:var(--danger-text);">⚠ Retard estimé : ~${delayDays(t)}j · Attendu : ${ep}% · Réalisé : ${t.avancement}%</div>`:''}
    ${blocked?`<div style="background:var(--warn-bg);border:1px solid var(--warn-text);border-radius:var(--radius);padding:8px 10px;margin-bottom:10px;font-size:11px;color:var(--warn-text);">🔗 En attente : <strong>${esc(pred.nom)}</strong> (avancement : ${pred.avancement}%) — cette tâche est bloquée.</div>`:''}
    <div class="form-group"><label>Nom</label><input id="f-nom" type="text" value="${esc(t.nom)}"></div>
    <div class="form-group"><label>Sous-traitant</label>
      <select id="f-st">${stSelectOptions(t.stId)}</select>
      <div style="font-size:10px;color:var(--text3);margin-top:4px;"><a href="#" onclick="switchView('st');closeModal();return false;" style="color:var(--info-text);">Gérer les sous-traitants →</a></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Début</label><input id="f-debut" type="date" value="${t.debut}" onchange="syncMinFin()"></div>
      <div class="form-group"><label>Fin</label><input id="f-fin" type="date" value="${t.fin}" min="${t.debut}"></div>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px;">Durée : <strong>${durJ} jours</strong></div>
    <div class="form-group"><label>Avancement : <span id="aval">${t.avancement}%</span></label>
      <input type="range" min="0" max="100" step="5" value="${t.avancement}" id="f-av" oninput="document.getElementById('aval').textContent=this.value+'%'"></div>
    <div class="form-group" style="border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;background:var(--bg2);">
      <label style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:6px;">Jours d'intervention / semaine</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input id="f-jps" type="number" min="1" max="5" step="1" value="${t.joursParSemaine||5}" style="width:60px;" oninput="updateJpsHint()">
        <span style="font-size:11px;color:var(--text2);">jour(s) sur 5 par semaine</span>
      </div>
      <div style="display:flex;gap:5px;margin-top:5px;">
        ${[1,2,3,4,5].map(n=>`<button type="button" onclick="document.getElementById('f-jps').value=${n};updateJpsHint()" style="flex:1;font-size:11px;padding:3px;${(t.joursParSemaine||5)===n?'background:var(--accent);color:white;border-color:var(--accent);':''}">${n}j</button>`).join('')}
      </div>
    </div>
    <div class="form-group" style="border:1px solid var(--border);border-radius:var(--radius);padding:9px 10px;background:var(--bg2);">
      <label style="font-weight:600;color:var(--text);margin-bottom:8px;">🔗 Dépendance</label>
      <select id="f-dep" style="margin-bottom:6px;" onchange="onDepChange()"><option value="">— Aucune dépendance —</option>${depOpts}</select>
      <div style="display:flex;gap:6px;align-items:center;">
        <label style="font-size:11px;margin:0;color:var(--text2);white-space:nowrap;">Type :</label>
        <select id="f-dep-type" style="flex:1;font-size:11px;" onchange="onDepChange()">
          <option value="FS"${(t.depType||'FS')==='FS'?' selected':''}>Finit avant (attend la fin)</option>
          <option value="SS"${t.depType==='SS'?' selected':''}>Commence avant (peut démarrer en parallèle)</option>
        </select>
      </div>
      <div id="dep-date-hint" style="font-size:10px;color:var(--info-text);background:var(--info-bg);border-radius:5px;padding:5px 8px;margin-top:6px;${t.dependsOn?'':'display:none;'}"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);margin-bottom:4px;">
      <input type="checkbox" id="f-locked" ${t.locked?'checked':''} style="width:auto;height:16px;width:16px;cursor:pointer;accent-color:var(--accent);">
      <label for="f-locked" style="margin:0;cursor:pointer;font-size:12px;color:var(--text);">🔒 Verrouiller <span style="font-size:10px;color:var(--text2);">(non déplaçable, jamais en retard)</span></label>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:14px;">
      <button onclick="delTask(${tid})" class="danger-btn">Supprimer</button>
      <div style="display:flex;gap:7px;">
        <button onclick="closeModal()">Annuler</button>
        <button onclick="updTask(${tid})" class="primary">Enregistrer</button>
      </div>
    </div>`);
  // Appliquer la contrainte de date si dépendance existante
  if(t.dependsOn) setTimeout(onDepChange, 30);
}

function updTask(tid){
  const nom=document.getElementById('f-nom').value.trim();
  const stId=parseInt(document.getElementById('f-st').value)||null;
  const debut=document.getElementById('f-debut').value,fin=document.getElementById('f-fin').value;
  const avancement=parseInt(document.getElementById('f-av').value)||0;
  const locked=document.getElementById('f-locked')?.checked||false;
  const dependsOn=parseInt(document.getElementById('f-dep')?.value)||null;
  const depType=document.getElementById('f-dep-type')?.value||'FS';
  const joursParSemaine=parseInt(document.getElementById('f-jps')?.value)||5;
  if(!nom||!debut||!fin){toast('Champs requis.');return;}
  const c=db.chantiers.find(x=>x.id===activeId),t=c.taches.find(x=>x.id===tid);
  Object.assign(t,{nom,stId,debut,fin,avancement,locked,dependsOn,depType,joursParSemaine});
  saveDB();closeModal();selectC(activeId);toast('Tâche mise à jour !');
}

function delTask(tid){
  if(!confirm('Supprimer cette tâche ?'))return;
  const c=db.chantiers.find(x=>x.id===activeId);
  c.taches=c.taches.filter(x=>x.id!==tid);
  saveDB();closeModal();selectC(activeId);toast('Tâche supprimée.');
}

function renameChantier(){
  const nom=document.getElementById('c-nom').value.trim();
  if(!nom){toast('Le nom est requis.');return;}
  const c=db.chantiers.find(x=>x.id===activeId);
  c.nom=nom; c.client=document.getElementById('c-client').value.trim()||'—';
  saveDB();closeModal();selectC(activeId);renderSidebar();toast('Chantier renommé !');
}

function archiveChantier(){
  const c=db.chantiers.find(x=>x.id===activeId);

  saveDB();closeModal();
  document.getElementById('h-name').textContent=c.nom+' 📦';

function unarchiveChantier(){

  saveDB();closeModal();selectC(activeId);renderSidebar();
  toast('Chantier remis en actif !');

function deleteChantier(){
  const c=db.chantiers.find(x=>x.id===activeId);
  if(!confirm(`⚠ Supprimer définitivement "${c.nom}" et toutes ses ${c.taches.length} tâche(s) ?\n\nCette action est irréversible.`))return;
  db.chantiers=db.chantiers.filter(x=>x.id!==activeId);
  activeId=null;

  document.getElementById('h-name').textContent='Sélectionnez un chantier';
  document.getElementById('h-meta').textContent='';
  document.getElementById('btn-share').disabled=true;
  document.getElementById('btn-add').disabled=true;

  document.getElementById('btn-settings').disabled=true;

function openAccessConstraints(){
  const c=db.chantiers.find(x=>x.id===activeId);if(!c)return;
  if(!c.contraintes)c.contraintes=[];
  const rows=c.contraintes.length ? c.contraintes.map((ct,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid ${ct.type==='inaccessible'?'var(--danger-border)':'var(--warn-text)'};border-radius:var(--radius);margin-bottom:5px;">
      <span style="font-size:16px;">${ct.type==='inaccessible'?'🚫':'⚠️'}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:600;color:var(--text);">${ct.type==='inaccessible'?'Inaccessible':'Accès partiel'}</div>
        <div style="font-size:11px;color:var(--text2);">${fmtShort(pDate(ct.debut))} → ${fmtShort(pDate(ct.fin))}${ct.note?' · '+ct.note:''}</div>
      </div>
      <button onclick="deleteAccessConstraint(${i})" class="danger-btn" style="font-size:11px;padding:3px 8px;">✕</button>
    </div>`).join('') : '<div style="font-size:12px;color:var(--text2);padding:8px 0;">Aucune contrainte d\'accès configurée.</div>';

  showModal(`<div class="modal-title">🚫 Contraintes d'accès — ${c.nom}</div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:12px;">Définissez les périodes où le chantier est inaccessible ou avec accès limité. Ces périodes s'affichent en surbrillance sur le Gantt.</p>
    <div id="ct-list">${rows}</div>
    <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:8px;">
      <p style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:8px;">Ajouter une période</p>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button id="ct-type-inac" onclick="setCTType('inaccessible')" style="flex:1;padding:7px;font-size:12px;background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-text);font-weight:600;">🚫 Inaccessible</button>
        <button id="ct-type-part" onclick="setCTType('partiel')" style="flex:1;padding:7px;font-size:12px;">⚠️ Accès partiel</button>
      </div>
      <div class="form-row" style="margin-bottom:8px;">
        <div class="form-group"><label>Début</label><input id="ct-debut" type="date" onchange="syncCTDates()"></div>
        <div class="form-group"><label>Fin</label><input id="ct-fin" type="date"></div>
      </div>
      <div class="form-group"><label>Note (optionnel) — ex: "Chambre 1 seulement", "Occupé le matin"</label>
        <input id="ct-note" type="text" placeholder="Précisez la zone ou la raison..."></div>
      <button onclick="addAccessConstraint()" class="primary" style="width:100%;padding:7px;margin-top:4px;">+ Ajouter cette contrainte</button>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:12px;">
      <button onclick="closeModal();selectC(activeId);">Fermer</button>
    </div>`);
  window._ctType='inaccessible';
}

let _ctType='inaccessible';
function setCTType(t){
  _ctType=t;
  document.getElementById('ct-type-inac').style.cssText='flex:1;padding:7px;font-size:12px;'+(t==='inaccessible'?'background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-text);font-weight:600;':'background:var(--bg);color:var(--text2);');
  document.getElementById('ct-type-part').style.cssText='flex:1;padding:7px;font-size:12px;'+(t==='partiel'?'background:var(--warn-bg);border-color:var(--warn-text);color:var(--warn-text);font-weight:600;':'background:var(--bg);color:var(--text2);');
}
function syncCTDates(){
  const d=document.getElementById('ct-debut').value;
  const fin=document.getElementById('ct-fin');
  if(d){fin.min=d;if(fin.value&&fin.value<d)fin.value=d;}
}
function addAccessConstraint(){
  const debut=document.getElementById('ct-debut').value;
  const fin=document.getElementById('ct-fin').value;
  const note=document.getElementById('ct-note').value.trim();
  if(!debut||!fin){toast('Les dates sont requises.');return;}
  if(debut>fin){toast('Date de début après la fin.');return;}
  const c=db.chantiers.find(x=>x.id===activeId);
  if(!c.contraintes)c.contraintes=[];
  c.contraintes.push({debut,fin,type:_ctType,note});
  c.contraintes.sort((a,b)=>a.debut.localeCompare(b.debut));
  saveDB();openAccessConstraints();
}
function deleteAccessConstraint(idx){
  const c=db.chantiers.find(x=>x.id===activeId);
  c.contraintes.splice(idx,1);
  saveDB();openAccessConstraints();
}

function generatePDF(c, filterStId, filename, monthFilter){
  // Vérifier que jsPDF est bien chargé
  if(!window.jspdf||!window.jspdf.jsPDF){
    toast('Librairie PDF non chargée — réessayez dans quelques secondes.');
    // Tenter de recharger jsPDF
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>toast('PDF prêt, réessayez l\'export !');
    document.head.appendChild(s);
    return;
  }
  const {jsPDF}=window.jspdf;
  let tasks=(filterStId!==undefined?c.taches.filter(t=>t.stId===filterStId):[...c.taches])
    .sort((a,b)=>a.debut.localeCompare(b.debut));
  if(monthFilter){
    // Garder uniquement les tâches qui chevauchent ce mois
    const mStart=new Date(monthFilter.year,monthFilter.month,1);
    const mEnd=new Date(monthFilter.year,monthFilter.month+1,0);
    tasks=tasks.filter(t=>pDate(t.fin)>=mStart&&pDate(t.debut)<=mEnd);
  }
  if(!tasks.length){toast('Aucune tâche pour cette période.');return;}

  // ── Mise en page ─────────────────────────────────────
  const PW=297;
  const LW=78;
  const BAR_W=PW-LW-5;
  const ROW=13;
  const HDR=32;
  const LEGFOOT=10;
  const PH=Math.max(HDR+tasks.length*ROW+LEGFOOT+3,80);

  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:[PH,PW]});

  // Plage de dates
  let mn, mx;
  if(monthFilter){
    mn=new Date(monthFilter.year,monthFilter.month,1);
    mx=new Date(monthFilter.year,monthFilter.month+1,0);
    // Snap mn au lundi précédent
    const dow=mn.getDay(); mn=addD(mn,-(dow===0?6:dow-1));
    mx=addD(mx,7);
  } else {
    const allD=tasks.flatMap(t=>[pDate(t.debut),pDate(t.fin)]);
    mn=new Date(Math.min(...allD)); mx=new Date(Math.max(...allD));
    const dow=mn.getDay(); mn=addD(mn,-(dow===0?6:dow-1));
    mn=addD(mn,-7); mx=addD(mx,14);
  }
  const totalDays=Math.max(diffD(mn,mx),1);
  const today=new Date();

  // Fond blanc
  pdf.setFillColor(255,255,255); pdf.rect(0,0,PW,PH+5,'F');

  // ── Titre (sobre, fond blanc) ─────────────────────────
  pdf.setFont('helvetica','bold'); pdf.setFontSize(12); pdf.setTextColor(26,26,24);
  const stLabel=(filterStId&&getST(filterStId))?(getST(filterStId).nom+' — '):'';
  const mLabel=monthFilter?' — '+new Date(monthFilter.year,monthFilter.month,1).toLocaleString('fr',{month:'long',year:'numeric'}):'';
  pdf.text(stLabel+c.nom+mLabel, 4, 9);
  pdf.setFont('helvetica','normal'); pdf.setFontSize(6.5); pdf.setTextColor(120,118,112);
  pdf.text('Client : '+c.client+'   |   Genere le '+fmtD(new Date()), 4, 14);
  // Séparateur fin
  pdf.setDrawColor(200,198,193); pdf.setLineWidth(0.4);
  pdf.line(0,16,PW,16);

  // ── En-tête mois ──────────────────────────────────────
  // Bande légère pour les mois
  pdf.setFillColor(248,248,246);
  pdf.rect(LW,17,BAR_W,7,'F');
  let cur=new Date(mn), prevM=-1;
  while(cur<=mx){
    const px=LW+diffD(mn,cur)/totalDays*BAR_W;
    if(cur.getMonth()!==prevM){
      prevM=cur.getMonth();
      pdf.setDrawColor(175,173,168); pdf.setLineWidth(0.5);
      pdf.line(px,17,px,HDR+tasks.length*ROW);
      pdf.setFont('helvetica','bold'); pdf.setFontSize(7); pdf.setTextColor(55,53,48);
      const ml=cur.toLocaleString('fr',{month:'long',year:'numeric'});
      pdf.text(ml.charAt(0).toUpperCase()+ml.slice(1), px+1.5, 22.5);
    }
    cur=addD(cur,7);
  }

  // ── Ligne des semaines dd/mm ───────────────────────────
  pdf.setFillColor(255,255,255);
  pdf.rect(LW,24,BAR_W,HDR-24,'F');
  cur=new Date(mn);
  while(cur<=mx){
    const px=LW+diffD(mn,cur)/totalDays*BAR_W;
    const dd=String(cur.getDate()).padStart(2,'0');
    const mm2=String(cur.getMonth()+1).padStart(2,'0');
    pdf.setFont('helvetica','bold'); pdf.setFontSize(5.5); pdf.setTextColor(90,88,83);
    pdf.text(dd+'/'+mm2, px-3, 30);
    // Trait de semaine
    pdf.setDrawColor(195,193,188); pdf.setLineWidth(0.35);
    pdf.line(px,24,px,HDR);
    // Grille légère sur les lignes
    pdf.setDrawColor(228,226,221); pdf.setLineWidth(0.15);
    pdf.line(px,HDR,px,HDR+tasks.length*ROW);
    cur=addD(cur,7);
  }

  // Bordure basse de l'en-tête
  pdf.setDrawColor(175,173,168); pdf.setLineWidth(0.5);
  pdf.line(0,HDR,PW,HDR);

  // En-tête label
  pdf.setFont('helvetica','bold'); pdf.setFontSize(6.5); pdf.setTextColor(55,53,48);
  pdf.text('TACHE  |  Dates', 4, 21);

  // Ligne aujourd'hui
  const tf=diffD(mn,today)/totalDays;
  if(tf>=0&&tf<=1){
    const tx=LW+tf*BAR_W;
    pdf.setDrawColor(210,55,52); pdf.setLineWidth(0.8);
    pdf.line(tx,HDR-2,tx,HDR+tasks.length*ROW);
    pdf.setFillColor(210,55,52);
    pdf.triangle(tx-2,HDR-2,tx+2,HDR-2,tx,HDR+1,'F');
    pdf.setFont('helvetica','bold'); pdf.setFontSize(5); pdf.setTextColor(210,55,52);
    pdf.text('Auj.',tx-3.5,HDR-3);
  }

  // ── Lignes de tâches ─────────────────────────────────
  tasks.forEach((t,i)=>{
    const y=HDR+i*ROW;
    const delayed=isDelayed(t), locked=!!t.locked, done=t.avancement;
    const ts=pDate(t.debut), te=pDate(t.fin);
    const durJ=taskDur(t.debut,t.fin);

    // Clamp les dates si export mensuel
    const visStart=monthFilter?new Date(Math.max(ts,mn)):ts;
    const visEnd=monthFilter?new Date(Math.min(te,mx)):te;

    const lx=LW+diffD(mn,ts)/totalDays*BAR_W;
    const visLx=LW+diffD(mn,visStart)/totalDays*BAR_W;
    const bw=Math.max((diffD(ts,te)+1)/totalDays*BAR_W, 2);
    const visBw=Math.max((diffD(visStart,visEnd)+1)/totalDays*BAR_W, 2);
    const[r,g,b]=hexToRgb(stColor(t.stId));
    const stNom=stName(t.stId);

    // Séparateur
    pdf.setDrawColor(225,223,218); pdf.setLineWidth(0.2);
    pdf.line(0,y+ROW,PW,y+ROW);

    // Bande latérale colorée (3mm)
    const[ar,ag,ab]=delayed?[210,55,52]:locked?[140,138,132]:[r,g,b];
    pdf.setFillColor(ar,ag,ab); pdf.rect(0,y,2.5,ROW,'F');

    // ── Colonne label : TACHE + dates uniquement ──
    const lx0=4;
    // Nom tâche
    pdf.setFont('helvetica','bold'); pdf.setFontSize(8);
    pdf.setTextColor(delayed?150:26, delayed?38:26, delayed?38:24);
    const maxC=40;
    const pfx=delayed?'[!] ':locked?'[F] ':'';
    const lbl=t.nom.length>maxC?t.nom.slice(0,maxC-1)+'...':t.nom;
    pdf.text(pfx+lbl, lx0, y+5.5);
    // Dates
    pdf.setFont('helvetica','normal'); pdf.setFontSize(6); pdf.setTextColor(130,128,122);
    const d1=String(ts.getDate()).padStart(2,'0')+'/'+String(ts.getMonth()+1).padStart(2,'0');
    const d2=String(te.getDate()).padStart(2,'0')+'/'+String(te.getMonth()+1).padStart(2,'0');
    pdf.text(d1+' au '+d2+'  ('+durJ+'j)', lx0, y+10);

    // ── Barre Gantt ──
    // Fond clair
    const fc=Math.round;
    pdf.setFillColor(fc(r+(255-r)*0.82),fc(g+(255-g)*0.82),fc(b+(255-b)*0.82));
    pdf.roundedRect(visLx, y+2, visBw, 9, 1.2, 1.2, 'F');

    // Bordure si verrouillé
    if(locked){pdf.setDrawColor(140,138,132);pdf.setLineWidth(0.4);pdf.roundedRect(visLx,y+2,visBw,9,1.2,1.2,'D');}

    // Progression
    if(done>0){
      const pw=Math.max(visBw*done/100, 2);
      pdf.setFillColor(delayed?210:locked?140:[r][0], delayed?55:locked?138:[g][0], delayed?52:locked?132:[b][0]);
      if(delayed){pdf.setFillColor(210,55,52);}
      else if(locked){pdf.setFillColor(140,138,132);}
      else{pdf.setFillColor(r,g,b);}
      pdf.roundedRect(visLx, y+2, pw, 9, 1.2, 1.2, 'F');
    }

    // Nom ST dans la barre
    if(visBw>16 && stNom && stNom!=='—'){
      pdf.setFont('helvetica','bold'); pdf.setFontSize(6.5); pdf.setTextColor(255,255,255);
      const maxW=Math.floor((visBw-4)/1.9);
      const bl=stNom.length>maxW?stNom.slice(0,maxW)+'...':stNom;
      pdf.text(bl, visLx+2.5, y+8);
    }
  });

  // ── Légende compacte ──────────────────────────────────
  const legY=HDR+tasks.length*ROW+1;
  pdf.setDrawColor(200,198,193); pdf.setLineWidth(0.3);
  pdf.line(0,legY,PW,legY);

  const stIds=[...new Set(tasks.map(t=>t.stId).filter(Boolean))];
  let lx2=4, ly2=legY+7;
  stIds.forEach(id=>{
    const st=getST(id); if(!st)return;
    const[r2,g2,b2]=hexToRgb(st.color);
    pdf.setFillColor(r2,g2,b2); pdf.roundedRect(lx2,ly2-3.5,3.5,3.5,0.6,0.6,'F');
    pdf.setFont('helvetica','normal'); pdf.setFontSize(6); pdf.setTextColor(60,58,53);
    pdf.text(st.nom, lx2+5, ly2);
    lx2+=Math.max(st.nom.length*2.4+12,28);
    if(lx2>PW-50){lx2=4; ly2+=7;}
  });

  pdf.save(filename+'.pdf');
  toast('PDF telecharge !');
}

function exportPDF(mode){
  const c=db.chantiers.find(x=>x.id===activeId);
  if(!c){toast('Aucun chantier sélectionné.');return;}
  const tmp=mode==='delayed'?{...c,taches:c.taches.filter(t=>isDelayed(t))}:c;
  if(!tmp.taches.length){toast('Aucune tâche à exporter.');return;}
  generatePDF(tmp,undefined,c.nom.replace(/\s+/g,'_')+(mode==='delayed'?'_retards':'_complet'),null);
  closeModal();
}

function exportSTPDF(stId){
  const c=db.chantiers.find(x=>x.id===activeId);
  if(!c.taches.some(t=>t.stId===stId)){toast('Aucune tâche pour ce sous-traitant.');return;}
  generatePDF(c,stId,c.nom.replace(/\s+/g,'_')+'_'+(getST(stId)?.nom||'st').replace(/[^a-zA-Z0-9]/g,'_'),null);
  closeModal();
}

function exportPDFByMonth(){
  const c=db.chantiers.find(x=>x.id===activeId);
  if(!c.taches.length){toast('Aucune tâche à exporter.');return;}
  // Trouver tous les mois couverts par les tâches
  const allD=c.taches.flatMap(t=>[pDate(t.debut),pDate(t.fin)]);
  const minD=new Date(Math.min(...allD)), maxD=new Date(Math.max(...allD));
  let cur=new Date(minD.getFullYear(),minD.getMonth(),1);
  const end=new Date(maxD.getFullYear(),maxD.getMonth(),1);
  const months=[];
  while(cur<=end){months.push({year:cur.getFullYear(),month:cur.getMonth()});cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  if(!months.length){toast('Aucun mois à exporter.');return;}
  // Générer un PDF par mois
  let count=0;
  months.forEach(m=>{
    const tasks=c.taches.filter(t=>{
      const mS=new Date(m.year,m.month,1),mE=new Date(m.year,m.month+1,0);
      return pDate(t.fin)>=mS&&pDate(t.debut)<=mE;
    });
    if(tasks.length){
      count++;
      const mName=new Date(m.year,m.month,1).toLocaleString('fr',{month:'long',year:'numeric'});
      generatePDF(c,undefined,c.nom.replace(/\s+/g,'_')+'_'+mName.replace(/\s+/g,'_'),m);
    }
  });
  toast(count+' PDF genere'+( count>1?'s':'')+' !');
  closeModal();
}

// Pour un jour donné, retourne {métier: [stIds actifs ce jour]}
function workloadOnDay(c, date){
  const d=date.getTime();
  const result={};
  c.taches.forEach(t=>{
    const ts=pDate(t.debut).getTime(), te=pDate(t.fin).getTime();
    if(d<ts||d>te)return;
    const st=db.soustraitants.find(s=>s.id===t.stId);
    if(!st)return;
    const metier=(st.metier||'Sans métier').trim()||'Sans métier';
    if(!result[metier])result[metier]=new Set();
    result[metier].add(st.id);
  });
  // Convertir Set en Array de tailles
  const out={};
  Object.entries(result).forEach(([m,set])=>{out[m]=Array.from(set);});
  return out;
}

// Mini-heatmap pour les cartes chantier : 14 jours à partir d'aujourd'hui
function renderWorkloadMini(c){
  if(!c.taches.length||c.archived)return '';
  const today=new Date();today.setHours(0,0,0,0);
  const days=[];
  for(let i=0;i<14;i++)days.push(addD(today,i));
  // Calculer la charge max sur les 14 jours pour normaliser
  let hasAny=false, maxOverlap=0;
  const dayData=days.map(d=>{
    const w=workloadOnDay(c,d);
    const total=Object.values(w).reduce((s,arr)=>s+arr.length,0);
    const trades=Object.entries(w);
    const maxSameTrade=Math.max(0,...Object.values(w).map(arr=>arr.length));
    if(total>0)hasAny=true;
    maxOverlap=Math.max(maxOverlap,maxSameTrade);
    return{date:d,total,maxSameTrade,trades};
  });
  if(!hasAny)return '';

  return `<div style="margin-bottom:10px;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);cursor:pointer;" onclick="event.stopPropagation();openWorkloadDetail(${c.id})" title="Cliquez pour voir le détail">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
      <span style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;font-weight:600;">Charge 14 jours</span>
      ${maxOverlap>=3?`<span style="font-size:10px;color:var(--danger-text);font-weight:600;">⚠ Surcharge</span>`:''}
    </div>
    <div style="display:flex;gap:1px;height:18px;">
      ${dayData.map(({date,total,maxSameTrade,trades})=>{
        const we=date.getDay()===0||date.getDay()===6;
        let color='var(--bg)';
        if(we) color='var(--bg3)';
        else if(maxSameTrade>=3) color='var(--danger)';
        else if(maxSameTrade===2) color='var(--warn-text)';
        else if(total>0) color='var(--accent)';
        const tradesStr=trades.map(([m,arr])=>`${m}: ${arr.length}`).join(', ');
        const title=`${fmtShort(date)} — ${total?tradesStr:'Vide'}`;
        return `<div style="flex:1;background:${color};border-radius:2px;${total>0?'opacity:'+Math.min(0.3+total*0.2,1):'opacity:0.3'};" title="${title}"></div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:3px;">
      <span>${fmtShort(dayData[0].date)}</span>
      <span>${fmtShort(dayData[13].date)}</span>
    </div>
  </div>`;
}

// Détail charge pour un chantier (sur 4 semaines)
function openWorkloadDetail(cid){
  const c=db.chantiers.find(x=>x.id===cid);
  if(!c)return;
  const today=new Date();today.setHours(0,0,0,0);
  const days=[];
  for(let i=-7;i<35;i++)days.push(addD(today,i));

  // Collecter tous les métiers présents
  const metierSet=new Set();
  days.forEach(d=>{
    Object.keys(workloadOnDay(c,d)).forEach(m=>metierSet.add(m));
  });
  const metiers=[...metierSet].sort();

  if(!metiers.length){
    toast('Aucune intervention prévue sur cette période.');return;
  }

  // Construire le tableau
  let table=`<table style="width:100%;border-collapse:collapse;font-size:11px;">
    <thead><tr>
      <th style="text-align:left;padding:5px;position:sticky;left:0;background:var(--bg);border:1px solid var(--border);min-width:120px;">Métier</th>`;
  days.forEach(d=>{
    const we=d.getDay()===0||d.getDay()===6;
    const isToday=diffD(d,today)===0;
    table+=`<th style="text-align:center;padding:3px 2px;font-size:9px;border:1px solid var(--border);min-width:24px;background:${isToday?'var(--accent)':we?'var(--bg3)':'var(--bg)'};color:${isToday?'white':we?'var(--text3)':'var(--text2)'};font-weight:${isToday?700:500};">
      <div>${d.getDate()}</div>
      <div style="font-size:8px;font-weight:400;">${d.toLocaleString('fr',{weekday:'narrow'})}</div>
    </th>`;
  });
  table+=`</tr></thead><tbody>`;

  metiers.forEach(m=>{
    table+=`<tr>
      <td style="padding:5px;position:sticky;left:0;background:var(--bg);border:1px solid var(--border);font-weight:600;color:var(--text);">${esc(m)}</td>`;
    days.forEach(d=>{
      const w=workloadOnDay(c,d);
      const arr=w[m]||[];
      const n=arr.length;
      const we=d.getDay()===0||d.getDay()===6;
      let bg=we?'var(--bg3)':'var(--bg)';
      let color='var(--text)';
      if(n>=3){bg='var(--danger)';color='white';}
      else if(n===2){bg='var(--warn-text)';color='white';}
      else if(n===1){bg='var(--info-bg)';color='var(--info-text);';}
      const stNoms=arr.map(id=>stName(id)).join(', ');
      table+=`<td style="text-align:center;padding:5px 2px;border:1px solid var(--border);background:${bg};color:${color};font-weight:${n>=2?700:400};" title="${stNoms}">${n||''}</td>`;
    });
    table+=`</tr>`;
  });
  table+=`</tbody></table>`;

  showModal(`<div class="modal-title">📊 Charge journalière — ${esc(c.nom)}</div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:10px;">Nombre de sous-traitants par métier et par jour. <strong style="color:var(--warn-text);">Orange</strong> = 2 du même métier (à surveiller), <strong style="color:var(--danger-text);">Rouge</strong> = 3+ (surcharge probable).</p>
    <div style="overflow-x:auto;max-width:100%;border:1px solid var(--border);border-radius:var(--radius);">
      ${table}
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:12px;">
      <button onclick="closeModal()">Fermer</button>
    </div>`);
}
