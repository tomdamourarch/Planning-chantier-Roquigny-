              const today2=new Date();
              const enC=pDate(t.debut)<=today2&&pDate(t.fin)>=today2&&!done;
              const statut=done?'✅':delayed?'⚠':enC?'🔵':'⏳';
              return`<tr style="border-bottom:1px solid var(--border);background:${delayed?'var(--danger-bg)':enC?'var(--info-bg)':'transparent'};">
                <td style="padding:7px 8px;font-weight:600;color:${delayed?'var(--danger-text)':'var(--text)'};">${statut} ${esc(t.nom)}</td>
                <td style="padding:7px 8px;color:var(--text2);">${fmtShort(pDate(t.debut))}</td>
                <td style="padding:7px 8px;color:var(--text2);">${fmtShort(pDate(t.fin))}</td>
                <td style="padding:7px 8px;color:var(--text2);">${taskDur(t.debut,t.fin)}j${t.joursParSemaine&&t.joursParSemaine<5?' · '+t.joursParSemaine+'j/sem':''}</td>
                <td style="padding:7px 8px;">
                  <div style="display:flex;align-items:center;gap:5px;">
                    <div style="width:60px;height:5px;background:var(--border);border-radius:3px;"><div style="height:100%;width:${t.avancement}%;background:${delayed?'var(--danger)':done?'var(--green-text)':'var(--accent)'};border-radius:3px;"></div></div>
                    <span style="font-size:11px;color:var(--text2);">${t.avancement}%</span>
                  </div>
                </td>
                <td style="padding:7px 8px;text-align:right;">
                  <button onclick="switchView('planning');selectC(${c.id});setTimeout(()=>openSTTaskModal(${t.id}),100);" style="font-size:10px;padding:3px 8px;">💬 Commenter</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`).join('')}
  </div>`;
}

// ============================================================
// QUICK UPDATE POPUP
// ============================================================
function openQuickPopup(event, tid){
  event.stopPropagation();
  const c=db.chantiers.find(x=>x.id===activeId);
  const t=c?.taches.find(x=>x.id===tid);
  if(!t)return;
  window._qpTask=t;
  window._qpChantier=c;
  const col=stColor(t.stId);
  const delayed=isDelayed(t), blocked=isBlocked(t);
  document.getElementById('qp-header').innerHTML=`
    <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3;">${esc(t.nom)}</div>
    <div style="font-size:11px;color:${col};font-weight:600;">${esc(stName(t.stId))}</div>
    <div style="font-size:12px;font-weight:700;color:var(--text);margin-top:4px;">${t.avancement}%  <span style="font-size:10px;font-weight:400;color:var(--text2);">(${fmtShort(pDate(t.debut))} au ${fmtShort(pDate(t.fin))} · ${diffD(pDate(t.debut),pDate(t.fin))}j)</span></div>
    ${delayed?'<div style="font-size:10px;color:var(--danger-text);margin-top:2px;">⚠ En retard</div>':''}
    ${blocked?'<div style="font-size:10px;color:var(--warn-text);margin-top:2px;">🔗 En attente</div>':''}`;
  updateQPBar();
  // Bouton "Modifier en détail" — on stocke l'ID directement dans l'attribut onclick
  document.getElementById('qp-edit-btn').onclick=function(){closeQuickPopup();openEdit(tid);};
  // Position
  const popup=document.getElementById('quick-popup');
  popup.style.display='block';
  const x=Math.min(event.clientX, window.innerWidth-310);
  const y=Math.min(event.clientY+10, window.innerHeight-280);
  popup.style.left=x+'px';
  popup.style.top=y+'px';
}

function updateQPBar(){
  const t=window._qpTask;
  if(!t)return;
  const col=stColor(t.stId);
  const fill=document.getElementById('qp-fill');
  if(fill){fill.style.width=t.avancement+'%';fill.style.background=isDelayed(t)?'var(--danger)':col;}
  const pct=document.querySelector('#qp-header div:nth-child(3)');
  if(pct) pct.innerHTML=`${t.avancement}%  <span style="font-size:10px;font-weight:400;color:var(--text2);">(${fmtShort(pDate(t.debut))} au ${fmtShort(pDate(t.fin))} · ${diffD(pDate(t.debut),pDate(t.fin))}j)</span>`;
}

function quickUpdateTask(delta){
  const t=window._qpTask, c=window._qpChantier;
  if(!t||!c)return;
  const real=c.taches.find(x=>x.id===t.id);
  if(!real)return;
  real.avancement=Math.max(0,Math.min(100,real.avancement+delta));
  window._qpTask=real;
  saveDB();updateQPBar();
  selectC(activeId);
  if(document.getElementById('view-overview').classList.contains('active'))renderOverview();
  toast(real.avancement+'%');
}

function quickExtendTask(days){
  const t=window._qpTask, c=window._qpChantier;
  if(!t||!c)return;
  const real=c.taches.find(x=>x.id===t.id);
  if(!real)return;
  const newFin=addD(pDate(real.fin),days);
  real.fin=newFin.toISOString().slice(0,10);
  window._qpTask=real;
  saveDB();updateQPBar();
  selectC(activeId);
  toast('Fin reportée au '+fmtShort(newFin));
}

function closeQuickPopup(){
  document.getElementById('quick-popup').style.display='none';
  window._qpTask=null;
}

// Fermer le popup en cliquant ailleurs
document.addEventListener('click',e=>{
  const popup=document.getElementById('quick-popup');
  if(popup&&popup.style.display==='block'&&!popup.contains(e.target))closeQuickPopup();
});

// JOURS NON TRAVAILLÉS
// ============================================================
function openNonWorkingSettings(){
  const nwd=db.nonWorkingDays||{skipWeekends:true,holidays:[]};
  const hols=(nwd.holidays||[]).sort().join('\n');
  showModal(`<div class="modal-title">📆 Jours non travaillés</div>
    <p style="font-size:11px;color:var(--text2);margin-bottom:12px;">Ces réglages affectent le calcul des retards (les jours non travaillés ne sont pas comptés).</p>
    <div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg2);border-radius:var(--radius);margin-bottom:12px;">
      <input type="checkbox" id="nwd-we" ${nwd.skipWeekends?'checked':''} style="width:auto;height:16px;width:16px;cursor:pointer;accent-color:var(--accent);">
      <label for="nwd-we" style="margin:0;font-size:13px;cursor:pointer;">Exclure les weekends (samedi + dimanche)</label>
    </div>
    <div class="form-group">
      <label>Jours fériés (un par ligne, format AAAA-MM-JJ)</label>
      <textarea id="nwd-hols" rows="8" style="width:100%;font-family:monospace;font-size:11px;padding:8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;">${hols}</textarea>
      <div style="font-size:10px;color:var(--text3);margin-top:4px;">Exemple : 2026-07-21 (Fête nationale belge)</div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:8px;">
      <button onclick="loadBelgianHolidays()" style="font-size:11px;flex:1;">🇧🇪 Recharger fériés belges</button>
      <button onclick="document.getElementById('nwd-hols').value=''" style="font-size:11px;flex:1;">Vider la liste</button>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:7px;margin-top:12px;">
      <button onclick="closeModal()">Annuler</button>
      <button onclick="saveNonWorking()" class="primary">Enregistrer</button>
    </div>`);
}

function loadBelgianHolidays(){
  document.getElementById('nwd-hols').value=HOLIDAYS_BELGIQUE.join('\n');
}

function saveNonWorking(){
  const skipWE=document.getElementById('nwd-we').checked;
  const lines=document.getElementById('nwd-hols').value.split('\n').map(s=>s.trim()).filter(s=>/^\d{4}-\d{2}-\d{2}$/.test(s));
  db.nonWorkingDays={skipWeekends:skipWE,holidays:lines};
  saveDB();closeModal();
  if(activeId)selectC(activeId);
  toast('Jours non travaillés mis à jour !');
}

// ============================================================
function showModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// INIT
document.getElementById('top-date').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

async function start(){
  await initDB();
  ensureTokens();
  detectSTMode();
  detectClientMode();

  if(isClient()){
    // Mode CLIENT : accès à un seul chantier, lecture seule + commentaires
    activeId=currentClient.chantierId;
    document.getElementById('top-date').textContent='👤 '+(currentClient.clientName||'Client')+' — '+currentClient.chantierNom;
    const banner=document.createElement('div');
    banner.style.cssText='background:#FFF7E6;border-bottom:1px solid #F0C36D;padding:6px 16px;font-size:12px;color:#7A5A1C;text-align:center;';
    banner.innerHTML=`Vous consultez le planning du chantier <strong>${esc(currentClient.chantierNom)}</strong> — cliquez sur une tâche pour laisser un commentaire`;
    document.querySelector('.topbar').insertAdjacentElement('afterend',banner);
    ['btn-add','btn-export','btn-share','btn-settings','btn-alerts'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
    const sb=document.querySelector('.sidebar-header');if(sb)sb.style.display='none';
    // Cacher tous les chantiers sauf celui-là
    db.chantiers=db.chantiers.filter(c=>c.id===currentClient.chantierId);
    // Cacher la page sous-traitants
    document.querySelector('[data-view="st"]')?.remove();
    selectC(activeId);
    return;
  }

  if(isST()){
    document.getElementById('top-date').textContent='👷 '+currentST.nom;
    const stBanner=document.createElement('div');
    stBanner.style.cssText='background:var(--info-bg);border-bottom:1px solid var(--info-border);padding:6px 16px;font-size:12px;color:var(--info-text);text-align:center;';
    stBanner.innerHTML=`Vous consultez ce planning en tant que <strong>${esc(currentST.nom)}</strong> — cliquez sur une tâche pour commenter ou proposer des dates`;
    document.querySelector('.topbar').insertAdjacentElement('afterend',stBanner);
    ['btn-add','btn-export','btn-share','btn-settings','btn-alerts'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
    const sb=document.querySelector('.sidebar-header');if(sb)sb.style.display='none';
  }
}
start();
</script>
